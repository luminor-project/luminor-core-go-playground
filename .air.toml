root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go run github.com/a-h/templ/cmd/templ@latest generate && go build -o ./tmp/main ./cmd/server"
  delay = 1000
  exclude_dir = ["assets", "static", "tmp", "vendor", "node_modules", "tests", ".git"]
  exclude_regex = ["_test.go", "_templ.go"]
  include_ext = ["go", "templ", "sql"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
