version: 1

compose:
  file: .productbuilding/preview/docker-compose.yml
  service: app

runtime:
  internal_port: 8080
  healthcheck_path: /healthz
  startup_timeout_seconds: 300

database:
  migrate_command: /app/migrate business up && /app/migrate rag up

# Logging configuration for the logs endpoint (optional, defaults to docker compose logs)
# logging:
#   service: app           # Which compose service has the logs (default: compose.service)
#   type: docker           # "docker" for stdout/stderr (default), "file" for file-based logs
#   path: /var/log/*.log   # Required when type="file" - path inside container

# Optional: note shown in PR comments (e.g., test credentials, important info)
# user_facing_note: "Test login: admin / secret"
