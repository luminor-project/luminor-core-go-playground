version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gosec
    - exhaustive
    - bodyclose
    - sqlclosecheck
    - funlen
    - cyclop
    - nestif
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    funlen:
      lines: 100
      statements: 60
    cyclop:
      max-complexity: 15
    nestif:
      min-complexity: 5
    exhaustive:
      default-signifies-exhaustive: true
    gosec:
      excludes:
        - G104
        - G117
        - G120
        - G706
  exclusions:
    paths:
      - node_modules
      - static
      - assets
      - ".*_templ\\.go$"
    rules:
      - path: ".*_test\\.go$"
        linters:
          - gosec
          - funlen
          - cyclop
          - nestif

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - node_modules
      - static
      - assets
      - ".*_templ\\.go$"
