name: Tests
on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose*.yml"
      - "mise.toml"
      - ".mise/**"
      - "migrations/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: jdx/mise-action@v3
      - name: Start services with build cache
        run: |
          export COMPOSE_BAKE=true
          docker compose up -d
      - name: Wait for services to be ready
        run: |
          echo "Waiting for app container to be ready..."
          until docker compose exec -T app sh -c 'mise --version' 2>/dev/null; do
            echo "App not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "App container is ready!"
      - name: Run unit tests
        run: docker compose exec -e GOFLAGS=-buildvcs=false -T app sh -lc 'cd /app && mise run tests'

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: jdx/mise-action@v3
      - name: Start services with build cache
        run: |
          export COMPOSE_BAKE=true
          docker compose up -d
      - name: Wait for services to be ready
        run: |
          echo "Waiting for app container to be ready..."
          until docker compose exec -T app sh -c 'mise --version' 2>/dev/null; do
            echo "App not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "App container is ready!"
      - name: Run integration tests
        run: docker compose exec -e GOFLAGS=-buildvcs=false -T app sh -lc 'cd /app && mise run tests-integration'
